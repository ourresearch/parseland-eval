<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-label="parseland-eval — live evaluation harness for the Parseland extraction service">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#1A2336"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>
  <circle cx="200" cy="110" r="220" fill="url(#glow)"/>

  <!-- Gold vs Parsed dot-cloud comparison motif -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="10" letter-spacing="0.18em">
    <text x="90" y="50" fill="#F97316">GOLD</text>
    <text x="270" y="50" fill="#94A3B8">PARSED</text>
  </g>

  <g opacity="0.95">
    <!-- Gold cluster (orange) -->
    <circle cx="95"  cy="82"  r="6" fill="#F97316"/>
    <circle cx="150" cy="120" r="6" fill="#F97316"/>
    <circle cx="110" cy="160" r="5" fill="#F97316"/>
    <circle cx="75"  cy="132" r="4" fill="#FB923C" opacity="0.7"/>
    <circle cx="170" cy="170" r="4" fill="#FB923C" opacity="0.6"/>

    <!-- Parsed cluster (slate) -->
    <circle cx="280" cy="88"  r="6" fill="#94A3B8"/>
    <circle cx="320" cy="130" r="6" fill="#94A3B8"/>
    <circle cx="260" cy="165" r="5" fill="#94A3B8"/>
    <circle cx="345" cy="102" r="4" fill="#64748B" opacity="0.7"/>
    <circle cx="300" cy="180" r="4" fill="#64748B" opacity="0.6"/>

    <!-- Dashed comparison lines -->
    <g stroke="#F97316" stroke-width="1.1" stroke-dasharray="3 4" opacity="0.7">
      <line x1="95"  y1="82"  x2="280" y2="88"/>
      <line x1="150" y1="120" x2="320" y2="130"/>
      <line x1="110" y1="160" x2="260" y2="165"/>
    </g>
  </g>

  <!-- Title block -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif">
    <text x="460" y="102" fill="#F8FAFC" font-size="56" font-weight="700" letter-spacing="-0.025em">parseland-eval</text>
    <text x="462" y="136" fill="#CBD5E1" font-size="18" font-weight="400">Live evaluation harness for the Parseland extraction service.</text>
    <text x="462" y="170" fill="#64748B" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" letter-spacing="0.08em">
      DOI  →  taxicab  →  parseland  →  score vs. gold standard
    </text>
  </g>

  <!-- Vertical accent on the right -->
  <rect x="1190" y="0" width="6" height="220" fill="url(#accent)"/>
  <!-- OpenAlex-orange horizontal hairline under title -->
  <rect x="460" y="148" width="58" height="2" fill="url(#accent)"/>
</svg>
